    <style>
        /* CSS RESET & VARIABLES */
        :root {
            --color-bg-primary: #0A0F1D;
            --color-bg-secondary: #12192C;
            --color-bg-tertiary: #1E2943;
            --color-accent-orange: #FF6B35;
            --color-accent-orange-hover: #E8551E;
            --color-accent-orange-light: rgba(255, 107, 53, 0.1);
            --color-accent-navy-light: #2A3B5F;
            --color-text-white: #FFFFFF;
            --color-text-muted: #94A3B8;
            --color-text-light: #E2E8F0;
            --color-border: rgba(148, 163, 184, 0.15);
            --font-family-base: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            --font-family-alt: 'Montserrat', sans-serif;
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --shadow-premium: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
            --shadow-glow: 0 0 20px rgba(255, 107, 53, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--color-bg-primary);
            color: var(--color-text-light);
            font-family: var(--font-family-base);
            line-height: 1.6;
            overflow-x: hidden;
        }

        input,
        select,
        textarea,
        button {
            font-family: inherit;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        /* Typography Helper Classes */
        .font-num {
            font-family: var(--font-family-alt);
        }

        /* CONTAINER */
        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* HEADER */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 15, 29, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--color-border);
            padding: 15px 0;
            transition: var(--transition-smooth);
        }

        header.scrolled {
            padding: 10px 0;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .header-wrap {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-area svg {
            width: 32px;
            height: 32px;
            fill: var(--color-accent-orange);
        }

        .logo-text {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--color-text-white);
            display: flex;
            align-items: center;
        }

        .logo-text span {
            color: var(--color-accent-orange);
            margin-left: 2px;
        }

        .header-contact {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .phone-call-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--color-text-white);
            font-weight: 700;
            font-size: 16px;
            background: var(--color-bg-secondary);
            border: 1px solid var(--color-border);
            padding: 8px 16px;
            border-radius: 50px;
            transition: var(--transition-smooth);
        }

        .phone-call-btn:hover {
            border-color: var(--color-accent-orange);
            color: var(--color-accent-orange);
            background: var(--color-accent-orange-light);
        }

        .quick-consult-btn {
            background: var(--color-accent-orange);
            color: var(--color-text-white);
            font-weight: 700;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            border: none;
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .quick-consult-btn:hover {
            background: var(--color-accent-orange-hover);
            transform: translateY(-2px);
            box-shadow: var(--shadow-glow);
        }

        /* HERO SECTION */
        .hero {
            position: relative;
            padding: 120px 0 100px;
            background: radial-gradient(circle at 70% 30%, var(--color-accent-navy-light) 0%, var(--color-bg-primary) 70%);
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M54 48c-2 0-3 1-4 2v4c0 1-1 2-2 2H4c-1 0-2-1-2-2v-4c0-1-1-2-4-2v-2c3 0 4-1 4-2v-4c0-1 1-2 2-2h44c1 0 2 1 2 2v4c0 1 1 2 4 2v2zM30 20c-2 0-3 1-4 2v4c0 1-1 2-2 2H4c-1 0-2-1-2-2v-4c0-1-1-2-4-2v-2c3 0 4-1 4-2v-4c0-1 1-2 2-2h20c1 0 2 1 2 2v4c0 1 1 2 4 2v2z' fill='%2394a3b8' fill-opacity='0.03' fill-rule='evenodd'/%3E%3C/svg%3E");
            pointer-events: none;

            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 40px;
            align-items: center;
        }

        .hero-content {
            position: relative;
            z-index: 10;
        }

        .hero-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 107, 53, 0.12);
            color: var(--color-accent-orange);
            font-size: 14px;
            font-weight: 700;
            padding: 6px 14px;
            border-radius: 50px;
            border: 1px solid rgba(255, 107, 53, 0.25);
            margin-bottom: 20px;
            animation: pulse-border 2s infinite;
        }

        @keyframes pulse-border {
            0% {
                border-color: rgba(255, 107, 53, 0.25);
            }

            50% {
                border-color: rgba(255, 107, 53, 0.6);
            }

            100% {
                border-color: rgba(255, 107, 53, 0.25);
            }

        .hero-title {

            font-weight: 800;

            margin-bottom: 24px;

        .hero-title span {
            background: linear-gradient(135deg, #FF9F1C 0%, #FF6B35 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-desc {
            font-size: 20px;
            color: var(--color-text-muted);
            margin-bottom: 40px;

        }

        .hero-ctas {

        }

        .btn {

            align-items: center;
            justify-content: center;

            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition-smooth);
            border: none;
        }

        .btn-primary {
            background: var(--color-accent-orange);
            color: var(--color-text-white);
        }

        .btn-primary:hover {
            background: var(--color-accent-orange-hover);
            transform: translateY(-3px);
            box-shadow: var(--shadow-glow);
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--color-border);
            color: var(--color-text-white);
        }

        .btn-secondary:hover {
            background: var(--color-bg-secondary);
            border-color: var(--color-text-white);
            transform: translateY(-3px);
        }

        .hero-badge-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-top: 50px;
            border-top: 1px solid var(--color-border);
            padding-top: 30px;
        }

        .hero-badge-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .hero-badge-title {
            font-size: 14px;
            color: var(--color-text-muted);
        }

        .hero-badge-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--color-text-white);
        }

        .hero-badge-value span {
            color: var(--color-accent-orange);
        }

        .hero-image-panel {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hero-card {
            background: rgba(18, 25, 44, 0.7);
            border: 1px solid var(--color-border);
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            box-shadow: var(--shadow-premium);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .hero-card-header {
            margin-bottom: 20px;
            border-bottom: 1px solid var(--color-border);
            padding-bottom: 15px;
        }

        .hero-card-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--color-text-white);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .hero-card-subtitle {
            font-size: 13px;
            color: var(--color-text-muted);
            margin-top: 4px;
        }

        .hero-stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .hero-stat-label {
            font-size: 14px;
            color: var(--color-text-muted);
        }

        .hero-stat-value {
            font-size: 15px;
            font-weight: 600;
            color: var(--color-text-light);
        }

        .hero-stat-value.highlight {
            color: var(--color-accent-orange);
            font-weight: 700;
        }

        .hero-card-cta {
            width: 100%;
            background: var(--color-accent-orange-light);
            border: 1px dashed var(--color-accent-orange);
            color: var(--color-accent-orange);
            font-weight: 700;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            margin-top: 15px;
            transition: var(--transition-smooth);
        }

        .hero-card-cta:hover {
            background: var(--color-accent-orange);
            color: var(--color-text-white);
            border-style: solid;
        }

        /* SECTION HEADER STYLE */
        .section-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .section-tag {
            font-size: 14px;
            font-weight: 700;
            color: var(--color-accent-orange);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
            display: inline-block;
        }

        .section-title {
            font-size: 36px;
            font-weight: 800;
            color: var(--color-text-white);
            letter-spacing: -1px;
        }

        .section-desc {
            font-size: 18px;
            color: var(--color-text-muted);
            margin-top: 10px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        /* CATEGORY CARDS SECTION */
        .categories {
            padding: 100px 0;
            background-color: var(--color-bg-secondary);
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
        }

        .category-card {
            background: var(--color-bg-tertiary);
            border: 1px solid var(--color-border);
            border-radius: 16px;
            padding: 30px;
            cursor: pointer;
            transition: var(--transition-smooth);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 240px;
        }

        .category-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--color-accent-orange);
            transform: scaleX(0);
            transform-origin: left;
            transition: var(--transition-smooth);
        }

        .category-card:hover {
            transform: translateY(-8px);
            border-color: rgba(255, 107, 53, 0.4);
            box-shadow: var(--shadow-premium);
        }

        .category-card:hover::before {
            transform: scaleX(1);
        }

        .category-icon-wrap {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            background: rgba(255, 107, 53, 0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 107, 53, 0.15);
            transition: var(--transition-smooth);
        }

        .category-card:hover .category-icon-wrap {
            background: var(--color-accent-orange);
        }

        .category-card:hover .category-icon-wrap svg {
            stroke: var(--color-text-white);
            fill: rgba(255, 255, 255, 0.2);
        }

        .category-icon-wrap svg {
            width: 24px;
            height: 24px;
            stroke: var(--color-accent-orange);
            stroke-width: 2;
            fill: none;
            transition: var(--transition-smooth);
        }

        .category-card-body {
            margin-top: 20px;
            flex-grow: 1;
        }

        .category-name {
            font-size: 20px;
            font-weight: 700;
            color: var(--color-text-white);
            margin-bottom: 8px;
        }

        .category-description {
            font-size: 16px;
            color: var(--color-text-muted);
            font-weight: 400;
        }

        .category-footer-link {
            font-size: 14px;
            font-weight: 700;
            color: var(--color-accent-orange);
            display: flex;
            align-items: center;
            gap: 4px;
            margin-top: 15px;
            transition: var(--transition-smooth);
        }

        .category-footer-link svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
            transition: var(--transition-smooth);
        }

        .category-card:hover .category-footer-link svg {
            transform: translateX(4px);
        }

        /* CALCULATOR & PRICE TABLE SECTION */
        .calculator-section {
            padding: 100px 0;
            background-color: var(--color-bg-primary);
        }

        .calc-container {
            display: grid;
            grid-template-columns: 1fr 420px;
            gap: 30px;
            align-items: start;
        }

        .calc-main {
            background: var(--color-bg-secondary);
            border: 1px solid var(--color-border);
            border-radius: 20px;
            padding: 30px;
            box-shadow: var(--shadow-premium);
        }

        /* Calculator Navigation Tabs with Arrow Scroll */
        .calc-tabs-wrapper {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 25px;
            border-bottom: 1px solid var(--color-border);
            padding-bottom: 15px;
            position: relative;
        }

        .tab-scroll-btn {
            flex: 0 0 auto;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1px solid var(--color-border);
            background: var(--color-bg-tertiary);
            color: var(--color-text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition-smooth);
            z-index: 2;
        }

        .tab-scroll-btn:hover {
            border-color: var(--color-accent-orange);
            color: var(--color-accent-orange);
            background: var(--color-accent-orange-light);
        }

        .calc-tabs {
            display: flex;
            overflow-x: auto;
            white-space: nowrap;
            gap: 8px;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
            flex: 1;
            min-width: 0;
            max-width: 780px;
            /* Limit width to show up to 'л°©л?лӘ??№мҲҳлӘ? */
            scrollbar-width: none;
            /* Firefox */
            -ms-overflow-style: none;
            /* IE and Edge */
        }

        .calc-tabs::-webkit-scrollbar {
            height: 0;
            width: 0;
            display: none;
        }

        .calc-tab {
            flex: 0 0 auto;
            min-width: auto;
            background: transparent;
            border: 1px solid var(--color-border);
            border-radius: 8px;
            color: var(--color-text-muted);
            padding: 10px 18px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
            transition: var(--transition-smooth);
        }

        .calc-tab:hover {
            border-color: var(--color-accent-orange);
            color: var(--color-text-white);
        }

        .calc-tab.active {
            background: var(--color-accent-orange);
            color: var(--color-text-white);
            border-color: var(--color-accent-orange);
            box-shadow: var(--shadow-glow);
        }

        /* Sub-category Tabs for л§Ҳк°җ?җмһ¬ */
        .sub-category-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 20px;
            padding: 10px;
            background: var(--color-bg-tertiary);
            border-radius: 10px;
            border: 1px solid var(--color-border);
        }

        .sub-calc-tab {
            background: transparent;
            border: none;
            color: var(--color-text-muted);
            padding: 6px 12px;
            font-size: 12px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .sub-calc-tab:hover {
            color: var(--color-text-white);
        }

        .sub-calc-tab.active {
            background: var(--color-accent-orange-light);
            color: var(--color-accent-orange);
            font-weight: 700;
        }

        /* Table Design */
        .table-responsive {
            overflow-x: auto;
        }

        .price-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        .price-table th {
            border-bottom: 1px solid var(--color-border);
            padding: 12px 16px;
            font-size: 14px;
            font-weight: 700;
            color: var(--color-text-white);
            background: rgba(148, 163, 184, 0.03);
        }

        .price-table td {
            padding: 16px;
            border-bottom: 1px solid var(--color-border);
            font-size: 15px;
            color: var(--color-text-light);
            vertical-align: middle;
        }

        .price-table tr {
            transition: var(--transition-smooth);
        }

        .price-table tr:hover {
            background: rgba(148, 163, 184, 0.02);
        }

        .prod-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .prod-name {
            font-weight: 700;
            color: var(--color-text-white);
        }

        .prod-spec {
            font-size: 14px;
            color: var(--color-text-muted);
        }

        .price-col {
            font-weight: 700;
            color: var(--color-text-white);
        }

        /* Quantity controls */
        .qty-control {
            display: flex;
            align-items: center;
            background: var(--color-bg-tertiary);
            border: 1px solid var(--color-border);
            border-radius: 6px;
            width: 110px;
            justify-content: space-between;
            overflow: hidden;
        }

        .qty-btn {
            background: transparent;
            border: none;
            color: var(--color-text-light);
            width: 32px;
            height: 32px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;

            color: var(--color-text-white);

        .qty-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .calc-sidebar {
            position: sticky;
            top: 100px;
            background: var(--color-bg-secondary);
            border: 1px solid var(--color-border);
            border-radius: 20px;
            padding: 35px;
            box-shadow: var(--shadow-premium);
            min-width: 380px;
        }

        .summary-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--color-text-white);
            margin-bottom: 22px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .summary-badge {
            background: var(--color-accent-orange);
            color: var(--color-text-white);
            font-size: 12px;
            padding: 3px 10px;
            border-radius: 12px;
            font-weight: 700;
        }

        .selected-list {
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 22px;
            border-bottom: 1px solid var(--color-border);
            padding-bottom: 15px;
        }

        .selected-list::-webkit-scrollbar {
            width: 4px;
        }

        .selected-list::-webkit-scrollbar-thumb {
            background: var(--color-accent-navy-light);
            border-radius: 10px;
        }

        .empty-cart-msg {
            color: var(--color-text-muted);
            text-align: center;
            padding: 40px 0;
            font-size: 14px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 14px;
            font-size: 13.5px;
            gap: 10px;
        }

        .cart-item-name {
            font-weight: 600;
            color: var(--color-text-white);
            word-break: keep-all;
            overflow-wrap: break-word;
            white-space: normal;
            flex: 1;
            min-width: 0;
        }

        .cart-item-qty {
            color: var(--color-accent-orange);
            font-weight: 700;
            white-space: nowrap;
        }

        .cart-item-price {
            font-weight: 700;
            white-space: nowrap;
        }

        .summary-total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: nowrap;
        }

        .total-label {
            font-size: 16px;
            font-weight: 700;
            color: var(--color-text-white);
            white-space: nowrap;
        }

        .total-price-wrap {
            text-align: right;
            white-space: nowrap;
        }

        .total-price {
            font-size: 28px;
            font-weight: 800;
            color: var(--color-accent-orange);
            letter-spacing: -0.5px;
            white-space: nowrap;
        }

        .total-price-vat {
            font-size: 11px;
            color: var(--color-text-muted);
        }

        .sidebar-actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-full {
            width: 100%;
            padding: 14px;
            font-size: 15px;
        }

        .btn-kakao {
            background: #FEE500;
            color: #191919;
            font-weight: 700;
            border: none;
        }

        .btn-kakao:hover {
            background: #E6CE00;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(254, 229, 0, 0.2);
        }

        /* CONSULTATION INQUIRY FORM */
        .inquiry {
            padding: 100px 0;
            background: var(--color-bg-secondary);
            border-top: 1px solid var(--color-border);
        }

        .inquiry-wrap {
            max-width: 700px;
            margin: 0 auto;
            background: var(--color-bg-tertiary);
            border: 1px solid var(--color-border);
            border-radius: 20px;
            padding: 40px;
            box-shadow: var(--shadow-premium);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        .form-label {
            font-size: 14px;
            font-weight: 700;
            color: var(--color-text-white);
        }

        .form-label span {
            color: var(--color-accent-orange);
        }

        .form-input,
        .form-select,
        .form-textarea {
            background: var(--color-bg-primary);
            border: 1px solid var(--color-border);
            border-radius: 8px;
            color: var(--color-text-white);
            padding: 12px 16px;
            font-size: 14px;
            outline: none;
            transition: var(--transition-smooth);
        }

        .form-input:focus,
        .form-select:focus,
        .form-textarea:focus {
            border-color: var(--color-accent-orange);
            box-shadow: 0 0 10px rgba(255, 107, 53, 0.15);
        }

        .form-textarea {
            height: 120px;
            resize: vertical;
        }

        .form-agree {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 30px;
            font-size: 13px;
            color: var(--color-text-muted);
            cursor: pointer;
        }

        .form-agree input {
            accent-color: var(--color-accent-orange);
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .form-agree a {
            text-decoration: underline;
        }

        /* FAQS SECTION */
        .faqs {
            padding: 100px 0;
            background: var(--color-bg-primary);
        }

        .faq-wrap {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .faq-item {
            background: var(--color-bg-secondary);
            border: 1px solid var(--color-border);
            border-radius: 12px;
            overflow: hidden;
            transition: var(--transition-smooth);
        }

        .faq-header {
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }

        .faq-question {
            font-size: 16px;
            font-weight: 700;
            color: var(--color-text-white);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .faq-question span {
            color: var(--color-accent-orange);
            font-family: var(--font-family-alt);
            font-weight: 800;
        }

        .faq-icon {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: var(--color-text-muted);
            stroke-width: 2.5;
            transition: var(--transition-smooth);
        }

        .faq-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s cubic-bezier(0, 1, 0, 1);
            background: rgba(148, 163, 184, 0.01);
        }

        .faq-content {
            padding: 0 24px 24px 44px;
            font-size: 16px;
            color: var(--color-text-muted);
            line-height: 1.8;
        }

        .faq-item.active {
            border-color: rgba(255, 107, 53, 0.3);
        }

        .faq-item.active .faq-body {
            max-height: 1000px;
            transition: max-height 0.3s cubic-bezier(1, 0, 1, 0);
        }

        .faq-item.active .faq-icon {
            transform: rotate(180deg);
            stroke: var(--color-accent-orange);
        }

        /* FOOTER */
        footer {
            background-color: #050811;
            padding: 60px 0 100px;
            border-top: 1px solid var(--color-border);
            font-size: 14px;
            color: var(--color-text-muted);
        }

        .footer-wrap {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 40px;
            margin-bottom: 40px;
        }

        .footer-info {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .footer-logo {
            font-size: 18px;
            font-weight: 800;
            color: var(--color-text-white);
        }

        .footer-logo span {
            color: var(--color-accent-orange);
        }

        .footer-details {
            font-size: 14px;
            line-height: 1.8;
        }

        .footer-copyright {
            margin-top: 20px;
            font-size: 12px;
        }

            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: flex-end;
        }

            font-weight: 800;
            color: var(--color-text-white);
            font-family: var(--font-family-alt);

            color: var(--color-accent-orange);
        }

            display: flex;
            gap: 20px;
        }

        .footer-bottom-nav a:hover {
            color: var(--color-text-white);
            text-decoration: underline;
        }

        /* FLOATING ACTION BOTTOM BAR FOR MOBILE */
        .floating-cta-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--color-bg-secondary);
            border-top: 1px solid var(--color-border);
            display: flex;
            z-index: 90;
            box-shadow: 0 -5px 15px rgba(0, 0, 0, 0.3);
            display: none;
            /* Desktop hidden */
        }

        .floating-cta-item {
            flex: 1;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-weight: 700;
            font-size: 15px;
            color: var(--color-text-white);
        }

        .floating-cta-item.call {
            background: var(--color-bg-secondary);
            border-right: 1px solid var(--color-border);
        }

        .floating-cta-item.kakao {
            background: #FEE500;
            color: #191919;
        }

        /* Success Popup Alert Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 15, 29, 0.8);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: var(--transition-smooth);
        }

        .modal.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-card {
            background: var(--color-bg-secondary);
            border: 1px solid var(--color-accent-orange);
            border-radius: 16px;
            padding: 40px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            box-shadow: var(--shadow-premium);
            transform: scale(0.9);
            transition: var(--transition-smooth);
        }

        .modal.active .modal-card {
            transform: scale(1);
        }

        .modal-icon {
            width: 60px;
            height: 60px;
            background: var(--color-accent-orange-light);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: var(--color-accent-orange);
        }

        .modal-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--color-text-white);
            margin-bottom: 10px;
        }

        .modal-desc {
            font-size: 14px;
            color: var(--color-text-muted);
            margin-bottom: 25px;
            line-height: 1.5;
        }

        /* RESPONSIVE DESIGN */
        @media (max-width: 1024px) {
            .hero-wrap {
                grid-template-columns: 1fr;
                gap: 50px;
                text-align: center;
            }

            .hero-content {
                display: flex;
                flex-direction: column;
                align-items: center;
            }

            .hero-desc {
                margin-left: auto;
                margin-right: auto;
            }

            .hero-badge-grid {
                width: 100%;
            }

            .category-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .calc-container {
                grid-template-columns: 1fr;
            }

            .calc-sidebar {
                position: static;
                min-width: auto;
            }
        }

        @media (max-width: 768px) {
            .hero {
                padding: 100px 0 60px;
            }

            .hero-title {
                font-size: 36px;
            }

            .category-grid {
                grid-template-columns: 1fr;
            }

            .calc-tabs {
                padding-bottom: 8px;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .form-group.full-width {
                grid-column: span 1;
            }

            .footer-wrap {
                grid-template-columns: 1fr;
                gap: 30px;
            }

            .footer-links {
                align-items: flex-start;
            }

            .floating-cta-bar {
                display: flex;
            }

            footer {
                padding-bottom: 100px;
                /* buffer space for bottom bar */
            }
        }

        /* Camera icon & Modal SPECIFIC STYLES */
        .prod-details-info {
            margin-bottom: 20px;
            text-align: left;
            font-size: 14px;
            background: var(--color-bg-primary);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--color-border);
        }

        .prod-details-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .prod-details-row:last-child {
            margin-bottom: 0;
        }

        .prod-details-label {
            color: var(--color-text-muted);
        }

        .prod-details-val {
            color: var(--color-text-white);
            font-weight: 600;
        }

        .prod-details-price {
            color: var(--color-accent-orange);
            font-weight: 700;
        }

        .camera-btn {
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-left: 8px;
            color: var(--color-accent-orange);
            vertical-align: middle;
            transition: var(--transition-smooth);
            opacity: 0.85;
        }

        .camera-btn:hover {
            color: var(--color-accent-orange-hover);
            transform: scale(1.1);
            opacity: 1;
        }

        .calc-tabs {
            flex-wrap: nowrap !important;
        }

        .btn-inquire {
            background: var(--color-accent-orange-light);
            color: var(--color-accent-orange);
            border: 1px solid var(--color-accent-orange);
            border-radius: 6px;
            padding: 6px 12px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: var(--transition-smooth);
            width: 100%;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-inquire:hover {
            background: var(--color-accent-orange);
            color: var(--color-text-white);
        }

        @keyframes row-highlight-animation {
            0% {
                background-color: rgba(255, 107, 53, 0.4);
            }

            100% {
                background-color: transparent;
            }
        }

        .highlight-row {
            animation: row-highlight-animation 2s ease-out;
        }

        .global-search-dropdown::-webkit-scrollbar {
            width: 6px;
        }

        .global-search-dropdown::-webkit-scrollbar-track {
            background: transparent;
        }

        .global-search-dropdown::-webkit-scrollbar-thumb {
            background: var(--color-border);
            border-radius: 3px;
        }
    </style>

</head>

                    ? `<span class="price-col" style="color: var(--color-accent-orange); font-weight: bold;">кІ¬м Ғл¬ёмқҳ</span>`
                    : `<span class="price-col font-num">${formatNumber(item.price)}</span>??;

                const controlDisplay = isQuoteOnly
                    ? `<button class="btn-inquire" type="button" onclick="inquireProduct('${item.name.replace(/'/g, "\\'")}', '${categoryKey}')">л¬ёмқҳ?ҳкё°</button>`
                    : `
                        <div class="qty-control">
                            <button class="qty-btn" type="button" onclick="adjustQty('${item.id}', -1)">-</button>
                            <input class="qty-input font-num" type="number" value="${qty}" min="0" onchange="setQty('${item.id}', this.value)" id="qty-input-${item.id}">
                            <button class="qty-btn" type="button" onclick="adjustQty('${item.id}', 1)">+</button>
                        </div>
                    `;

                tr.innerHTML = `
                    <td>
                        <span class="prod-name">${item.name}${cameraIcon}</span>
                    </td>
                    <td>
                        <span class="prod-spec" style="font-size:14px; color: var(--color-text-muted);">${item.spec}</span>
                    </td>
                    <td><span class="font-num" style="font-size:13px;">${item.unit}</span></td>
                    <td>${priceDisplay}</td>
                    <td>
                        ${controlDisplay}
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // 5. Tab switcher logic
        function switchCalcTab(categoryKey) {
            currentActiveTab = categoryKey;

            // Remove active classes
            document.querySelectorAll(".calc-tab").forEach(tab => {
                tab.classList.remove("active");
            });

            // Set active class
            const targetTab = document.getElementById(`tab-${categoryKey}`);
            if (targetTab) {
                targetTab.classList.add("active");
            }

            // Show/Hide sub-categories
            const finishWrap = document.getElementById("sub-category-wrap");
            const deckWrap = document.getElementById("deck-subcategory-wrap");

            // Toggle delivery warning banner
            const deliveryAlert = document.getElementById("delivery-info-alert");
            if (deliveryAlert) {
                deliveryAlert.style.display = (categoryKey === "delivery") ? "flex" : "none";
            }

            if (categoryKey === "finishing") {
                finishWrap.style.display = "flex";
                deckWrap.style.display = "none";
                filterFinishingSub("all");
            } else if (categoryKey === "deck_timber") {
                finishWrap.style.display = "none";
                deckWrap.style.display = "flex";
                filterDeckSub("all");
            } else {
                finishWrap.style.display = "none";
                deckWrap.style.display = "none";
                loadProducts(categoryKey);
            }
        }

        function adjustQty(productId, delta) {
            const input = document.getElementById(`qty-input-${productId}`);
            let currentVal = parseInt(input.value) || 0;
            let newVal = currentVal + delta;
            if (newVal < 0) newVal = 0;

            input.value = newVal;
            setQty(productId, newVal);
        }

        function setQty(productId, value) {
            const qty = parseInt(value) || 0;
            if (qty <= 0) {
                delete selectedQuantities[productId];
            } else {
                selectedQuantities[productId] = qty;
            }
            updateEstimateSummary();
        }

        // 7. Calculate and update estimate summary card
        function updateEstimateSummary() {
            const listContainer = document.getElementById("selected-items-list");
            listContainer.innerHTML = "";

            let total = 0;
            let count = 0;
            let hasItems = false;

            for (const cat in PRODUCTS_DATA) {
                PRODUCTS_DATA[cat].forEach(prod => {
                    const qty = selectedQuantities[prod.id];
                    if (qty && qty > 0) {
                        hasItems = true;
                        count += 1;
                        const subtotal = prod.price * qty;
                        total += subtotal;

                        const itemDiv = document.createElement("div");
                        itemDiv.className = "cart-item";
                        itemDiv.innerHTML = `
                            <span class="cart-item-name">${prod.name}</span>
                            <span class="cart-item-qty font-num">${qty}${prod.unit}</span>
                            <span class="cart-item-price font-num">${formatNumber(subtotal)}??/span>
                        `;
                        listContainer.appendChild(itemDiv);
                    }
                });
            }

            if (!hasItems) {
                listContainer.innerHTML = '<div class="empty-cart-msg">? нғқ???җмһ¬к°Җ ?ҶмҠө?ҲлӢӨ.<br>?ҳлҹү??м¶”к???мЈјм„ё??</div>';
            }

            document.getElementById("selected-count").innerText = `${count}к°?? нғқ??;
            document.getElementById("total-val").innerText = formatNumber(total);
        }

        // 8. Number Formatting Utility
        function formatNumber(num) {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        }

        // 9. Generate prefilled message of selected items
        function getSelectedItemsText() {
            let text = "[?ӨмӢңк°??Ёк????җмһ¬ кІ¬м Ғ лҰ¬мҠӨ??\n";
            let total = 0;
            let hasItems = false;

            for (const cat in PRODUCTS_DATA) {
                PRODUCTS_DATA[cat].forEach(prod => {
                    const qty = selectedQuantities[prod.id];
                    if (qty && qty > 0) {
                        hasItems = true;
                        const subtotal = prod.price * qty;
                        total += subtotal;
                        text += `- ${prod.name} (${prod.spec}): ${qty}${prod.unit} (?Ёк?: ${formatNumber(prod.price)}??/ ?Ңкі„: ${formatNumber(subtotal)}??\n`;
                    }
                });
            }

            if (!hasItems) return "";

            text += `\nмҙ?кІ¬м Ғ ?©кі„ кёҲм•Ў: ${formatNumber(total)}??(л¶Җк°Җ???ҙл°ҳл№?лі„лҸ„)\n*?ҒлҰј?°л“ң ?Ёлқј??л№ лҘё ?ҒлӢҙ кІ¬м Ғ`;
            return text;
        }

        // 10. Copy Estimate to Consultation Form Textarea
        function copyEstimateAndScroll() {
            const listText = getSelectedItemsText();
            const textarea = document.getElementById("inquiryText");

            if (listText) {
                textarea.value = listText + "\n\n?„мһҘ ?Ғм„ё ?•ліҙ л°?л°°мҶЎ к°Җ?Ҙмқј мЎ°мңЁ ?”мІӯ?©лӢҲ??";
                const select = document.getElementById("targetCategory");

                const catMap = {
                    finishing: "л§Ҳк°җ?җмһ¬",
                    mdf: "MDF",
                    plywood: "?©нҢҗ",
                    interior_plywood: "?ён…ҢлҰ¬м–ҙ?©нҢҗ",
                    timber: "лӘ©мһ¬/кө¬мЎ°??,
                    plaster: "?қкі ліҙл“ң",
                    insulation: "?Ём—ҙ??,
                    deck_timber: "л°©л?лӘ??№мҲҳлӘ?,
                    louver_wood: "лЈЁл°”_м§‘м„ұ??,
                    hardware: "мІ л¬ј/л¶Җ?җмһ¬"
                };

                if (catMap[currentActiveTab]) {
                    select.value = catMap[currentActiveTab];
                }

                scrollToElement("inquiry-form-sec");
            } else {
                alert("кі„мӮ°кё°м—җ???ҳлҹү??1к°??ҙмғҒ м¶”к??ҳмӢ  ??кІ¬м Ғ л¬ёмқҳлҘ??Ңлҹ¬мЈјмӢңл©? л¬ёмқҳ ?ҙмҡ© ?Җ??кІ¬м Ғ лҰ¬мҠӨ?ёк? ?җлҸҷ ?…л Ҙ?©лӢҲ??");
                scrollToElement("calculator-sec");
            }
        }

        // 11. Send Kakao Estimate (Prefilled message)
        function sendKakaoEstimate(event) {
            const listText = getSelectedItemsText();
            if (listText) {
                navigator.clipboard.writeText(listText).then(() => {
                    alert("? нғқ?ҳмӢ  кІ¬м Ғ ?ҙм—ӯ???ҙлҰҪліҙл“ң???җлҸҷ?јлЎң ліөмӮ¬?ҳм—Ҳ?өлӢҲ??\n?Өн”Ҳмұ„нҢ…л°??°кІ° ??л¶ҷм—¬?Јкё°(Ctrl+V)?ҳмӢңл©?л№ лҘё ?ҒлӢҙ??л°ӣм•„ліҙмӢӨ ???ҲмҠө?ҲлӢӨ.");
                }).catch(err => {
                    // Fallback
                });
            }
        }

        // 12. Handle Inquiry Form Submit (EmailJS with attachment generation)
        function handleFormSubmit(event) {
            event.preventDefault();

            const name = document.getElementById("clientName").value.trim();
            const tel = document.getElementById("clientTel").value.trim();
            const agree = document.getElementById("privacyAgree").checked;

            if (!name || !tel) {
                alert("?ҙлҰ„кі??°лқҪмІҳлҠ” ?„мҲҳ ?…л Ҙ ??Ә©?…лӢҲ??");
                return;
            }

            if (!agree) {
                alert("к°ңмқё?•ліҙ ?ҳм§‘ л°??ҙмҡ© л°©м№Ё???ҷмқҳ??мЈјм„ё??");
                return;
            }

            const submitBtn = event.target.querySelector('button[type="submit"]');
            const originalText = submitBtn.textContent;
            submitBtn.disabled = true;
            submitBtn.textContent = "?ҒлӢҙ ? мІӯ???„мҶЎ?ҳлҠ” мӨ?..";

            // Generate HTML table rows for the estimate items
            let estimateRowsHtml = "";
            let itemIndex = 1;
            let totalVal = 0;
            for (const cat in PRODUCTS_DATA) {
                PRODUCTS_DATA[cat].forEach(prod => {
                    const qty = selectedQuantities[prod.id];
                    if (qty && qty > 0) {
                        const subtotal = prod.price * qty;
                        totalVal += subtotal;

                        // Alternate row backgrounds for readability (zebra striping)
                        const bgColor = (itemIndex % 2 === 0) ? "#f9f9f9" : "#ffffff";

                        estimateRowsHtml += `
                          <tr style="background-color: ${bgColor}; border-bottom: 1px solid #eeeeee;">
                            <td style="padding: 10px 8px; border: 1px solid #dddddd; text-align: center; font-size: 13px; color: #555555; width: 8%;">${itemIndex++}</td>
                            <td style="padding: 10px 8px; border: 1px solid #dddddd; text-align: left; font-size: 13px; font-weight: bold; color: #333333; width: 42%;">${prod.name}</td>
                            <td style="padding: 10px 8px; border: 1px solid #dddddd; text-align: left; font-size: 13px; color: #666666; width: 22%;">${prod.spec || "-"}</td>
                            <td style="padding: 10px 8px; border: 1px solid #dddddd; text-align: center; font-size: 13px; color: #333333; width: 8%;">${qty}</td>
                            <td style="padding: 10px 8px; border: 1px solid #dddddd; text-align: right; font-size: 13px; color: #555555; width: 10%;">${formatNumber(prod.price)}??/td>
                            <td style="padding: 10px 8px; border: 1px solid #dddddd; text-align: right; font-size: 13px; font-weight: bold; color: #FF6B35; width: 10%;">${formatNumber(subtotal)}??/td>
                          </tr>
                        `;
                    }
                });
            }

            // Add total row highlighted with brand color (#FF6B35)
            if (itemIndex > 1) {
                estimateRowsHtml += `
                  <tr style="background-color: #fff2ec; font-weight: bold; border-top: 2px solid #FF6B35;">
                    <td colspan="3" style="padding: 12px 8px; border: 1px solid #dddddd; text-align: center; font-size: 14px; color: #FF6B35;">?©кі„ (л¶Җк°Җ??л°°мҶЎл№?лі„лҸ„)</td>
                    <td style="padding: 12px 8px; border: 1px solid #dddddd; text-align: center; font-size: 14px; color: #FF6B35;">-</td>
                    <td style="padding: 12px 8px; border: 1px solid #dddddd; text-align: right; font-size: 14px; color: #FF6B35;">-</td>
                    <td style="padding: 12px 8px; border: 1px solid #dddddd; text-align: right; font-size: 14px; color: #FF6B35; font-size: 15px;">${formatNumber(totalVal)}??/td>
                  </tr>
                `;
            } else {
                estimateRowsHtml += `
                  <tr>
                    <td colspan="6" style="padding: 20px; border: 1px solid #dddddd; text-align: center; font-size: 13px; color: #999999;">? нғқ??кІ¬м Ғ ?ҙм—ӯ???ҶмҠө?ҲлӢӨ.</td>
                  </tr>
                `;
            }

            // Prepare EmailJS Template Parameters
            const templateParams = {
                company: name,
                phone: tel,
                category: document.getElementById("targetCategory").value,
                area: document.getElementById("deliveryArea").value || "?…л Ҙ ????,
                message: document.getElementById("inquiryText").value,
                estimate_rows: estimateRowsHtml
            };

            // EmailJS send call
            emailjs.send("service_itchlia", "template_6udhffm", templateParams)
                .then(response => {
                    submitBtn.disabled = false;
                    submitBtn.textContent = originalText;

                    // Show Success Modal
                    const modal = document.getElementById("successModal");
                    modal.classList.add("active");

                    // Reset Form and Cart
                    document.getElementById("inquiryForm").reset();
                    selectedQuantities = {};
                    document.querySelectorAll(".qty-input").forEach(input => {
                        input.value = 0;
                    });
                    updateEstimateSummary();
                })
                .catch(error => {
                    console.error(error);
                    submitBtn.disabled = false;
                    submitBtn.textContent = originalText;
                    alert("?ҒлӢҙ ? мІӯ ?„мҶЎ мӨ??ӨлҘҳк°Җ л°ңмғқ?ҲмҠө?ҲлӢӨ. ? мӢң ???ӨмӢң ?ңлҸ„??мЈјм„ё??\n?ӨлҘҳ ?Ғм„ё: " + (error.message || error.text || error));
                });
        }

        function closeModal() {
            const modal = document.getElementById("successModal");
            modal.classList.remove("active");
        }

        // 13. Open/Close Product Spec Modal
        function openProductModal(name, spec, image, unit, price) {
            document.getElementById("prodModalTitle").innerText = name;
            document.getElementById("prodModalSpec").innerText = spec;
            document.getElementById("prodModalImg").src = image;
            document.getElementById("prodModalUnit").innerText = unit;

            if (price === 0 || price === null || price === "0" || price === "null" || price === "кІ¬м Ғл¬ёмқҳ") {
                document.getElementById("prodModalPrice").innerText = "кІ¬м Ғл¬ёмқҳ";
                document.getElementById("prodModalPrice").style.color = "var(--color-accent-orange)";
            } else {
                document.getElementById("prodModalPrice").innerText = formatNumber(price) + "??;
                document.getElementById("prodModalPrice").style.color = "";
            }

            const modal = document.getElementById("productImageModal");
            modal.classList.add("active");
        }

        function closeProductModal() {
            const modal = document.getElementById("productImageModal");
            modal.classList.remove("active");
        }

        // 13.5 Inquire quote for individual items
        function inquireProduct(name, categoryKey) {
            const textarea = document.getElementById("inquiryText");
            textarea.value = `[кІ¬м Ғл¬ёмқҳ ?ҲлӘ©]\n?ҲлӘ…: ${name}\n\n???ҲлӘ©???Җ??кІ¬м Ғ л°??©кё° л¬ёмқҳ?©лӢҲ??`;

            const select = document.getElementById("targetCategory");
            const catMap = {
                finishing: "л§Ҳк°җ?җмһ¬",
                mdf: "MDF",
                plywood: "?©нҢҗ",
                interior_plywood: "?ён…ҢлҰ¬м–ҙ?©нҢҗ",
                timber: "лӘ©мһ¬/кө¬мЎ°??,
                plaster: "?қкі ліҙл“ң",
                insulation: "?Ём—ҙ??,
                deck_timber: "л°©л?лӘ??№мҲҳлӘ?,
                louver_wood: "лЈЁл°”_м§‘м„ұ??,
                hardware: "мІ л¬ј/л¶Җ?җмһ¬"
            };
            if (catMap[categoryKey]) {
                select.value = catMap[categoryKey];
            }
            scrollToElement("inquiry-form-sec");
        }

        // 14. Sub-category filters
        function filterFinishingSub(subKey) {
            currentFinishingSub = subKey;
            const wrap = document.getElementById("sub-category-wrap");
            wrap.querySelectorAll(".sub-calc-tab").forEach(btn => {
                btn.classList.remove("active");
            });
            const targetBtn = Array.from(wrap.querySelectorAll(".sub-calc-tab")).find(btn => btn.getAttribute("onclick").includes("'" + subKey + "'"));
            if (targetBtn) {
                targetBtn.classList.add("active");
            }
            loadProducts("finishing", subKey);
        }

        function filterDeckSub(subKey) {
            currentDeckSub = subKey;
            const wrap = document.getElementById("deck-subcategory-wrap");
            wrap.querySelectorAll(".sub-calc-tab").forEach(btn => {
                btn.classList.remove("active");
            });
            const targetBtn = Array.from(wrap.querySelectorAll(".sub-calc-tab")).find(btn => btn.getAttribute("onclick").includes("'" + subKey + "'"));
            if (targetBtn) {
                targetBtn.classList.add("active");
            }
            loadProducts("deck_timber", subKey);
        }

        // 15. Toggle FAQs
        function toggleFaq(headerElement) {
            const item = headerElement.parentElement;
            const isActive = item.classList.contains("active");

            document.querySelectorAll(".faq-item").forEach(el => {
                el.classList.remove("active");
            });

            if (!isActive) {
                item.classList.add("active");
            }
        }
    </script>
