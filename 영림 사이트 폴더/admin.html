    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js">        function backupData() {
            const data = {};
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith('yw_')) {
                    data[key] = localStorage.getItem(key);
                }
            }
            const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            const date = new Date().toISOString().split('T')[0];
            a.download = yw_backup_ + date + .json;
            a.click();
            URL.revokeObjectURL(url);
        }

        function restoreData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (confirm('諛깆뾽 ?곗씠?곕? 蹂듭썝?섏떆寃좎뒿?덇퉴? 湲곗〈 ?곗씠?곕뒗 ??뼱?뚯썙吏묐땲??')) {
                        for (const key in data) {
                            if (key.startsWith('yw_')) {
                                localStorage.setItem(key, data[key]);
                            }
                        }
                        alert('蹂듭썝?섏뿀?듬땲??');
                        location.reload();
                    }
                } catch(err) {
                    alert('?섎せ??諛깆뾽 ?뚯씪?낅땲??');
                }
                event.target.value = '';
            };
            reader.readAsText(file);
        }
        let referencesData = [];
        const DEFAULT_REFERENCES = [
            { id: 'r1', title: '?≫뙆援??洹쒕え ?꾪뙆???좎텞', items: '?앷퀬蹂대뱶, 寃쎈웾泥좉낏 ??, date: '2024.05' },
            { id: 'r2', title: '媛뺣궓援?吏?앹궛?낆꽱??, items: '泥쒖옣?? ?⑥뿴?? 紐⑹옱', date: '2024.04' },
            { id: 'r3', title: '?깅궓 臾쇰쪟?쇳꽣', items: '寃쎈웾泥좉낏, ?앷퀬蹂대뱶, ?꾩뼱', date: '2024.03' }
        ];

        function loadReferencesData() {
            const saved = localStorage.getItem('yw_references_data');
            if (saved) {
                referencesData = JSON.parse(saved);
            } else {
                referencesData = JSON.parse(JSON.stringify(DEFAULT_REFERENCES));
                localStorage.setItem('yw_references_data', JSON.stringify(referencesData));
            }
            renderAdminReferences();
        }

        function renderAdminReferences() {
            const tbody = document.querySelector('#table-references tbody');
            if (!tbody) return;
            tbody.innerHTML = '';
            referencesData.forEach(item => {
                const tr = document.createElement('tr');
                tr.innerHTML = 
                    <td><input type="text" class="form-input" value="+item.title+" onchange="updateReference('+item.id+', 'title', this.value)"></td>
                    <td><input type="text" class="form-input" value="+item.items+" onchange="updateReference('+item.id+', 'items', this.value)"></td>
                    <td><input type="text" class="form-input" value="+item.date+" onchange="updateReference('+item.id+', 'date', this.value)"></td>
                    <td><button class="btn btn-outline" style="color:red;border-color:red" onclick="removeReference('+item.id+')">??젣</button></td>
                ;
                tbody.appendChild(tr);
            });
        }

        function addReferenceItem() {
            const newId = 'r' + Date.now();
            referencesData.unshift({ id: newId, title: '', items: '', date: '' });
            saveReferences();
            renderAdminReferences();
        }

        function updateReference(id, field, value) {
            const item = referencesData.find(i => i.id === id);
            if (item) {
                item[field] = value;
                saveReferences();
            }
        }

        function removeReference(id) {
            if(confirm('???ㅼ쟻????젣?섏떆寃좎뒿?덇퉴?')) {
                referencesData = referencesData.filter(i => i.id !== id);
                saveReferences();
                renderAdminReferences();
            }
        }

        function saveReferences() {
            localStorage.setItem('yw_references_data', JSON.stringify(referencesData));
        }

        const originalInit2 = window.onload;
        window.onload = function() {
            if(originalInit2) originalInit2();
            loadReferencesData();
        };
</script>

        // ===== INIT =====
        function init() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                try {
                    productData = JSON.parse(stored);
                    const defaults = getDefaultData();
                    for (const cat in defaults) {
                        if (!productData[cat]) {
                            productData[cat] = defaults[cat];
                        } else {
                            defaults[cat].forEach(dProd => {
                                const matched = productData[cat].find(p => p.id === dProd.id);
                                if (!matched) {
                                    productData[cat].push(dProd);
                                } else {
                                    if (matched.code === undefined) matched.code = dProd.code || "";
                                    if (matched.unit === undefined) matched.unit = dProd.unit || "";
                                }
                            });
                        }
                    }
                } catch (e) {
                    console.error("Failed to parse storage, falling back to default", e);
                    productData = getDefaultData();
                }
            } else {
                productData = getDefaultData();
            }

            const storedImages = localStorage.getItem(STORAGE_IMAGES_KEY);
            if (storedImages) {
                try { imageStore = JSON.parse(storedImages); } catch (e) { imageStore = {}; }
            }

            renderTabs();
            switchAdminTab("finishing");
        }

        // ===== LOGIN & ROLE HANDLING =====
        function toggleStaffNameInput() {
            const role = document.getElementById("adminAccountRole").value;
            const group = document.getElementById("staffNameGroup");
            const staffNameInput = document.getElementById("adminStaffName");
            if (role === 'editor') {
                group.style.display = 'block';
                staffNameInput.required = true;
            } else {
                group.style.display = 'none';
                staffNameInput.required = false;
                staffNameInput.value = "";
            }
        }

        function handleLogin(e) {
            e.preventDefault();
            const pwd = document.getElementById("adminPassword").value;
            const role = document.getElementById("adminAccountRole").value;
            const staffName = document.getElementById("adminStaffName").value.trim();

            if (pwd === ADMIN_PASSWORD) {
                if (role === 'editor' && !staffName) {
                    alert("직원 성함을 입력해 주세요.");
                    return;
                }

                currentUser = {
                    role: role,
                    staffName: role === 'owner' ? '' : staffName,
                    name: role === 'owner' ? '대표' : `직원 (${staffName})`
                };

                document.getElementById("adminUserLabel").textContent = `${currentUser.name} 계정`;
                document.getElementById("loginScreen").style.display = "none";
                document.getElementById("adminWrap").classList.add("active");

                init();
            } else {
                document.getElementById("loginError").style.display = "block";
                setTimeout(() => {
                    document.getElementById("loginError").style.display = "none";
                }, 3000);
            }
        }

        function handleLogout() {
            document.getElementById("loginScreen").style.display = "flex";
            document.getElementById("adminWrap").classList.remove("active");
            document.getElementById("adminPassword").value = "";
            document.getElementById("adminStaffName").value = "";
            document.getElementById("staffNameGroup").style.display = "none";
            document.getElementById("adminAccountRole").value = "owner";
            currentUser = {};
        }

        // Permission check helper
        function checkPermission(action) {
            if (currentUser.role === 'owner') {
                return true;
            }

            // Editor (Staff) Restrictions
            if (action === 'delete_product') {
                alert("권한 오류: 품목 삭제 권한은 대표 계정에만 부여됩니다.");
                return false;
            }
            if (action === 'import_excel') {
                alert("권한 오류: 엑셀 불러오기(일괄 단가/코드 수정) 권한은 대표 계정에만 부여됩니다.");
                return false;
            }
            return true;
        }

        // ===== TABS =====
        function renderTabs() {
            const tabsEl = document.getElementById("adminTabs");
            tabsEl.innerHTML = "";
            for (const [key, label] of Object.entries(CATEGORIES)) {
                const btn = document.createElement("button");
                btn.className = "admin-tab" + (key === currentCategory ? " active" : "");
                btn.textContent = label;
                btn.onclick = () => switchAdminTab(key);
                tabsEl.appendChild(btn);
            }
        }

        function switchAdminTab(key) {
            if (currentUser.role) {
                flushTableInputs();
            }
            currentCategory = key;
            document.getElementById("toolbarTitle").textContent = CATEGORIES[key];
            renderTabs();
            renderTable();
        }

        // ===== TABLE RENDER =====
        function renderTable() {
            const tbody = document.getElementById("adminTableBody");
            const theadTr = document.querySelector(".data-table thead tr");
            
            if (currentCategory === 'references') {
                theadTr.innerHTML = `
                    <th style="width: 40px; text-align:center"></th>
                    <th style="width: 60px;">No</th>
                    <th style="width: 150px; display:none;">품목코드</th>
                    <th>프로젝트명</th>
                    <th>납품품목</th>
                    <th style="width: 100px; text-align:center">완료일</th>
                    <th style="width: 150px; text-align:right; display:none;">단가</th>
                    <th style="width: 100px; text-align:center">삭제</th>
                `;
            } else {
                theadTr.innerHTML = `
                    <th style="width: 40px; text-align:center"></th>
                    <th style="width: 60px;">No</th>
                    <th style="width: 150px;">품목코드</th>
                    <th>품명</th>
                    <th>규격</th>
                    <th style="width: 100px; text-align:center">단위</th>
                    <th style="width: 150px; text-align:right">단가</th>
                    <th style="width: 100px; text-align:center">삭제</th>
                `;
            }

            tbody.innerHTML = "";
            const items = productData[currentCategory] || [];

            const isRef = currentCategory === 'references';

            items.forEach((item, index) => {
                const tr = document.createElement("tr");

                tr.innerHTML = `
                <td class="drag-handle" style="cursor: grab; text-align: center; color: var(--color-text-muted); font-size: 16px; user-select: none;">⠿</td>
                <td><span class="font-num" style="font-size:13px;color:var(--color-text-muted)">${index + 1}</span></td>
                <td style="${isRef ? 'display:none;' : ''}"><input type="text" class="table-input font-num" value="${item.code || ''}" placeholder="코드 입력"></td>
                <td><input type="text" class="table-input" value="${item.name || ''}" placeholder="${isRef ? '프로젝트명 입력' : '품명 입력'}"></td>
                <td><input type="text" class="table-input" value="${item.spec || ''}" placeholder="${isRef ? '납품품목 입력' : '규격 입력'}"></td>
                <td><input type="text" class="table-input" value="${item.unit || ''}" placeholder="${isRef ? 'YYYY-MM-DD' : '단위'}" style="text-align:center;"></td>
                <td style="${isRef ? 'display:none;' : ''}"><input type="number" class="table-input font-num text-right" value="${item.price || 0}" placeholder="0"></td>
                <td style="text-align:center">
                    <button class="btn btn-danger btn-sm" onclick="deleteRow('${item.id}')">삭제</button>
                </td>
            `;

                const handle = tr.querySelector(".drag-handle");
                handle.addEventListener("mousedown", () => {
                    tr.setAttribute("draggable", "true");
                });
                handle.addEventListener("mouseup", () => {
                    tr.removeAttribute("draggable");
                });

                tr.addEventListener("dragstart", (e) => {
                    e.dataTransfer.setData("text/plain", index);
                    tr.classList.add("dragging");
                });

                tr.addEventListener("dragend", () => {
                    tr.removeAttribute("draggable");
                    tr.classList.remove("dragging");
                    tbody.querySelectorAll("tr").forEach(r => r.classList.remove("drag-over"));
                });

                tr.addEventListener("dragover", (e) => {
                    e.preventDefault();
                    tr.classList.add("drag-over");
                });

                tr.addEventListener("dragleave", () => {
                    tr.classList.remove("drag-over");
                });

                tr.addEventListener("drop", (e) => {
                    e.preventDefault();
                    const fromIndex = parseInt(e.dataTransfer.getData("text/plain"));
                    const toIndex = index;
                    if (fromIndex !== toIndex && !isNaN(fromIndex)) {
                        flushTableInputs();
                        const items = productData[currentCategory];
                        const draggedItem = items.splice(fromIndex, 1)[0];
                        items.splice(toIndex, 0, draggedItem);
                        renderTable();
                    }
                });

                tbody.appendChild(tr);
            });
        }

        // Scan DOM input fields to write back to productData array
        function flushTableInputs() {
            const tbody = document.getElementById("adminTableBody");
            const rows = tbody.querySelectorAll("tr");
            const items = productData[currentCategory] || [];

            rows.forEach((tr, index) => {
                const item = items[index];
                if (item) {
                    const inputs = tr.querySelectorAll("input");
                    if (inputs.length >= 5) {
                        item.code = inputs[0].value.trim();
                        item.name = inputs[1].value.trim();
                        item.spec = inputs[2].value.trim();
                        item.unit = inputs[3].value.trim();
                        item.price = parseInt(inputs[4].value.trim()) || 0;
                    }
                }
            });
        }

        // ===== ADD ROW =====
        function addRow() {
            if (!checkPermission('save_product')) return;
            flushTableInputs();

            const newId = currentCategory.charAt(0) + "_" + Date.now();
            const defaultUnit = {
                finishing: "장",
                mdf: "장",
                plywood: "장",
                interior_plywood: "장",
                timber: "개",
                plaster: "장",
                insulation: "장",
                deck_timber: "개",
                hardware: "개",
                delivery: "회",
                louver_wood: "장"
            }[currentCategory] || "개";

            const newItem = {
                id: newId,
                code: "",
                name: "",
                spec: "",
                unit: defaultUnit,
                price: 0
            };

            if (currentCategory === "finishing") {
                newItem.sub = "other";
            } else if (currentCategory === "deck_timber") {
                newItem.sub = "treated";
            }

            if (!productData[currentCategory]) {
                productData[currentCategory] = [];
            }
            productData[currentCategory].push(newItem);
            renderTable();
            showToast("새 품목 행이 추가되었습니다! 저장 버튼을 누르면 최종 반영됩니다.");
        }

        // ===== DELETE ROW =====
        function deleteRow(productId) {
            if (!checkPermission('delete_product')) return;
            if (!confirm('이 품목을 삭제하시겠습니까?')) return;

            flushTableInputs();
            productData[currentCategory] = (productData[currentCategory] || []).filter(i => i.id !== productId);
            renderTable();
            showToast("품목이 화면에서 제거되었습니다! 저장 버튼을 누르면 최종 반영됩니다.");
        }

        function saveAllData() {
            if (!checkPermission('save_product')) return;
            flushTableInputs();
            localStorage.setItem(STORAGE_KEY, JSON.stringify(productData));
            showToast("변경사항이 성공적으로 저장되어 메인페이지에 즉시 반영되었습니다!");

        // ===== EXPORT/IMPORT BACKUP JSON =====
        function exportBackupJSON() {
            flushTableInputs();
            const exportData = {
                products: productData,
                exportDate: new Date().toISOString()
            };

            const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "youngrim_backup_" + new Date().toISOString().slice(0, 10) + ".json";
            a.click();
            URL.revokeObjectURL(url);
            showToast("백업 데이터가 다운로드되었습니다.");
        }

        function triggerRestoreUpload() {
            document.getElementById('restoreUpload').click();
        }

        function importBackupJSON(event) {
            const file = event.target.files[0];
            if (!file) return;

            if (!confirm("백업 데이터를 복원하시겠습니까? 현재 저장된 모든 데이터가 덮어씌워집니다.")) {
                event.target.value = "";
                return;
            }

            const reader = new FileReader();
            reader.onload = function (e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (data && data.products) {
                        localStorage.setItem(STORAGE_KEY, JSON.stringify(data.products));
                        alert("복원이 완료되었습니다. 페이지를 새로고침합니다.");
                        location.reload();
                    } else {
                        alert("잘못된 백업 파일 형식입니다.");
                    }
                } catch (err) {
                    console.error(err);
                    alert("백업 파일을 읽는 중 오류가 발생했습니다.");
                }
                event.target.value = "";
            };
            reader.readAsText(file);
        }

        // ===== EXPORT EXCEL (Multi-sheet, Styled) =====
        function exportToExcel() {
            try {
                flushTableInputs();
                localStorage.setItem(STORAGE_KEY, JSON.stringify(productData));

                const workbook = XLSX.utils.book_new();

                for (const catKey in productData) {
                    const catName = CATEGORIES[catKey] || catKey;
                    const sheetName = catName.replace(/\//g, "_");

                    const aoaData = [
                        ["No", "품목코드", "품명", "규격", "단위", "단가"]
                    ];

                    productData[catKey].forEach((item, index) => {
                        aoaData.push([
                            index + 1,
                            item.code || "",
                            item.name || "",
                            item.spec || "",
                            item.unit || "",
                            item.price
                        ]);
                    });

                    const worksheet = XLSX.utils.aoa_to_sheet(aoaData);

                    // Apply style to headers: A1 to F1 (Bold, gray background, center alignment)
                    const cols = ["A", "B", "C", "D", "E", "F"];
                    for (let i = 0; i < 6; i++) {
                        const cellRef = cols[i] + "1";
                        if (worksheet[cellRef]) {
                            worksheet[cellRef].s = {
                                fill: { fgColor: { rgb: "EAEAEA" } },
                                font: { bold: true, name: "맑은 고딕", size: 10 },
                                alignment: { horizontal: "center", vertical: "center" }
                            };
                        }
                    }

                    XLSX.utils.book_append_sheet(workbook, worksheet, sheetName);
                }

                XLSX.writeFile(workbook, "youngrim_prices_" + new Date().toISOString().slice(0, 10) + ".xlsx");
                showToast("엑셀 내보내기가 완료되었습니다! (최신 저장 데이터 기준)");
            } catch (error) {
                console.error(error);
                alert("엑셀 내보내기에 실패했습니다.");
            }
        }

        function normalizeStr(str) {
            if (!str) return "";
            return str.toString().replace(/\s+/g, "").toLowerCase();

            if (!checkPermission('import_excel')) {
                event.target.value = "";
                return;

            if (!file) return;

            const sheetToCatKey = {
                "마감자재": "finishing",
                "MDF": "mdf",
                "합판": "plywood",
                "인테리어합판": "interior_plywood",
                "목재구조재": "timber",
                "석고보드": "plaster",
                "단열재": "insulation",
                "방부목특수목": "deck_timber",
                "루바집성판": "louver_wood",
                "철물부자재": "hardware",
                "운반비": "delivery"
            };

            const reader = new FileReader();
            reader.onload = function (e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });

                    let updatedCount = 0;

                    workbook.SheetNames.forEach(sheetName => {
                        const catKey = sheetToCatKey[sheetName];
                        if (catKey && productData[catKey]) {
                            const worksheet = workbook.Sheets[sheetName];
                            const jsonData = XLSX.utils.sheet_to_json(worksheet);

                            jsonData.forEach(row => {
                                const rowName = row["품명"];
                                const rowSpec = row["규격"] || "";
                                const rowCode = row["품목코드"] !== undefined ? row["품목코드"].toString().trim() : "";
                                const rowUnit = row["단위"] !== undefined ? row["단위"].toString().trim() : "";

                                let rowPrice = row["단가"];
                                let parsedPrice = 0;
                                if (rowPrice !== undefined && rowPrice !== null) {
                                    let strPrice = rowPrice.toString().replace(/,/g, '').trim();
                                    if (strPrice === "" || strPrice === "견적문의" || strPrice === "null" || strPrice === "0") {
                                        parsedPrice = 0;
                                    } else {
                                        parsedPrice = parseInt(strPrice) || 0;
                                    }
                                }

                                if (rowName) {
                                    const normRowKey = normalizeStr(rowName) + "|" + normalizeStr(rowSpec);

                                    // Search in the current category list
                                    const item = productData[catKey].find(p => {
                                        const normItemKey = normalizeStr(p.name) + "|" + normalizeStr(p.spec);
                                        return normItemKey === normRowKey;
                                    });

                                    if (item) {
                                        item.price = parsedPrice;
                                        item.code = rowCode;
                                        if (rowUnit) item.unit = rowUnit;
                                        updatedCount++;
                                    }
                                }
                            });
                        }
                    });

                    if (updatedCount > 0) {
                        localStorage.setItem(STORAGE_KEY, JSON.stringify(productData));
                        showToast(`${updatedCount}개 품목의 단가/품목코드/단위가 수정 및 실시간 동기화되었습니다!`);
                        renderTable();
                    } else {
                        alert("가져온 엑셀 데이터 중 매칭되는 품목이 없거나 형식이 올바르지 않습니다.");
                    }
                } catch (error) {
                    console.error(error);
                    alert("엑셀 파일 읽기에 실패했습니다.");
                }
                event.target.value = "";
            };
            reader.readAsArrayBuffer(file);
        }

        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.textContent = message;
            toast.classList.add("active");
            setTimeout(() => {
                toast.classList.remove("active");
            }, 2500);
        }
            function backupData() {
            const data = {};
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith('yw_')) {
                    data[key] = localStorage.getItem(key);
                }
            }
            const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            const date = new Date().toISOString().split('T')[0];
            a.download = yw_backup_ + date + .json;
            a.click();
            URL.revokeObjectURL(url);
        }

        function restoreData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (confirm('諛깆뾽 ?곗씠?곕? 蹂듭썝?섏떆寃좎뒿?덇퉴? 湲곗〈 ?곗씠?곕뒗 ??뼱?뚯썙吏묐땲??')) {
                        for (const key in data) {
                            if (key.startsWith('yw_')) {
                                localStorage.setItem(key, data[key]);
                            }
                        }
                        alert('蹂듭썝?섏뿀?듬땲??');
                        location.reload();
                    }
                } catch(err) {
                    alert('?섎せ??諛깆뾽 ?뚯씪?낅땲??');
                }
                event.target.value = '';
            };
            reader.readAsText(file);
        }
        let referencesData = [];
        const DEFAULT_REFERENCES = [
            { id: 'r1', title: '?≫뙆援??洹쒕え ?꾪뙆???좎텞', items: '?앷퀬蹂대뱶, 寃쎈웾泥좉낏 ??, date: '2024.05' },
            { id: 'r2', title: '媛뺣궓援?吏?앹궛?낆꽱??, items: '泥쒖옣?? ?⑥뿴?? 紐⑹옱', date: '2024.04' },
            { id: 'r3', title: '?깅궓 臾쇰쪟?쇳꽣', items: '寃쎈웾泥좉낏, ?앷퀬蹂대뱶, ?꾩뼱', date: '2024.03' }
        ];

        function loadReferencesData() {
            const saved = localStorage.getItem('yw_references_data');
            if (saved) {
                referencesData = JSON.parse(saved);
            } else {
                referencesData = JSON.parse(JSON.stringify(DEFAULT_REFERENCES));
                localStorage.setItem('yw_references_data', JSON.stringify(referencesData));
            }
            renderAdminReferences();
        }

        function renderAdminReferences() {
            const tbody = document.querySelector('#table-references tbody');
            if (!tbody) return;
            tbody.innerHTML = '';
            referencesData.forEach(item => {
                const tr = document.createElement('tr');
                tr.innerHTML = 
                    <td><input type="text" class="form-input" value="+item.title+" onchange="updateReference('+item.id+', 'title', this.value)"></td>
                    <td><input type="text" class="form-input" value="+item.items+" onchange="updateReference('+item.id+', 'items', this.value)"></td>
                    <td><input type="text" class="form-input" value="+item.date+" onchange="updateReference('+item.id+', 'date', this.value)"></td>
                    <td><button class="btn btn-outline" style="color:red;border-color:red" onclick="removeReference('+item.id+')">??젣</button></td>
                ;
                tbody.appendChild(tr);
            });
        }

        function addReferenceItem() {
            const newId = 'r' + Date.now();
            referencesData.unshift({ id: newId, title: '', items: '', date: '' });
            saveReferences();
            renderAdminReferences();
        }

        function updateReference(id, field, value) {
            const item = referencesData.find(i => i.id === id);
            if (item) {
                item[field] = value;
                saveReferences();
            }
        }

        function removeReference(id) {
            if(confirm('???ㅼ쟻????젣?섏떆寃좎뒿?덇퉴?')) {
                referencesData = referencesData.filter(i => i.id !== id);
                saveReferences();
                renderAdminReferences();
            }
        }

        function saveReferences() {
            localStorage.setItem('yw_references_data', JSON.stringify(referencesData));
        }

        const originalInit2 = window.onload;
        window.onload = function() {
            if(originalInit2) originalInit2();
            loadReferencesData();
        };
</script>
